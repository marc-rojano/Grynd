services:
  # Servicio de la Base de Datos (PostgreSQL)
  db:
    image: postgres:14-alpine
    restart: always
    environment:
      POSTGRES_USER: grynduser
      POSTGRES_PASSWORD: gryndpassword
      POSTGRES_DB: grynd
    ports:
      - '5432:5432' # Mapea el puerto de la DB a tu máquina local
    volumes:
      - postgres-data:/var/lib/postgresql/data # Persiste los datos de la DB
      - ./db:/docker-entrypoint-initdb.d # Ejecuta scripts .sql al inicializar
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grynduser -d grynd"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Servicio del Backend (Node.js/Express)
  backend:
    build: ./backend # Construye la imagen desde el Dockerfile en la carpeta backend
    restart: always
    ports:
      - '3000:3000'
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: 'true'
    env_file:
      - ./backend/.env # Carga las variables de entorno desde el archivo .env del backend
    depends_on:
      db:
        condition: service_healthy # Espera a que la DB esté saludable, no solo iniciada

  # Servicio del Frontend (React/Vite)
  frontend:
    build: ./frontend
    restart: always
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: 'true'
      WATCHPACK_POLLING: 'true'

volumes:
  postgres-data: # Define el volumen para la persistencia de datos